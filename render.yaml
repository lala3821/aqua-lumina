# Render.com デプロイ設定
# https://dashboard.render.com で GitHub リポジトリを接続してデプロイ

services:
  - type: web
    name: aqua-lumina
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SITE_URL
        value: https://aqua-lumina.onrender.com
