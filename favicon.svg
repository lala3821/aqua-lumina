<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="AQUA LUMINA">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect width="32" height="32" rx="6" fill="url(#glow)"/>
  <rect x="3" y="3" width="26" height="26" rx="4" fill="none" stroke="#22d3ee" stroke-width="1.25"/>
  <text
    x="16"
    y="20.5"
    font-family="'JetBrains Mono', 'Consolas', 'Courier New', monospace"
    font-size="10.5"
    font-weight="600"
    fill="#22d3ee"
    text-anchor="middle"
    letter-spacing="0.6"
    filter="url(#soft)"
  >AL</text>
</svg>
